project:
  type: website
  output-dir: _site
  # Explicit render list. Notebooks are rendered from their STORED outputs (execute: false below),
  # so no kernel, no network, and no withheld data are needed at render time.
  render:
    - index.qmd
    - notebooks/01_reconstruct_published_network.ipynb
    - notebooks/02_resolve_network_to_genes.ipynb
    - notebooks/03_assemble_validation_cases.ipynb

website:
  title: "Pigmentation gene network"
  description: "Knowing when a genetic variant causes a phenotype — by making independent lines of evidence converge."
  reader-mode: true
  navbar:
    left:
      - href: index.qmd
        text: Overview
      - href: notebooks/01_reconstruct_published_network.ipynb
        text: "NB1 · Reconstruct the network"
      - href: notebooks/02_resolve_network_to_genes.ipynb
        text: "NB2 · Resolve to genes"
      - href: notebooks/03_assemble_validation_cases.ipynb
        text: "NB3 · Validation cases"

format:
  html:
    theme: cosmo
    toc: true
    code-tools: true
    code-fold: show

execute:
  enabled: false   # render stored notebook outputs only — no kernel, no network, no withheld data at render time
