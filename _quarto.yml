    - notebooks/01c_extract_hirisplex_markers.ipynb
    - notebooks/01d_reproduce_gwas_catalog.ipynb
    - notebooks/02_resolve_network_to_genes.ipynb
    - notebooks/03_assemble_validation_cases.ipynb
    - notebooks/04_unified_association_base.ipynb
    - notebooks/05_compare_candidate_networks.ipynb
    - notebooks/06_gene_regulatory_network.ipynb
    - notebooks/07_harmonized_substrate.ipynb
    - notebooks/08_rescue_screen_diagnostic.ipynb
    - notebooks/09_bajpai_reconciliation.ipynb
    - notebooks/10_mechanism_direction_law.ipynb
    - notebooks/11_cross_ancestry_conditionality.ipynb
    - notebooks/12_direction_law_expanded.ipynb
    - notebooks/13_sex_hormone_layer.ipynb
    - notebooks/14_hormone_pigment_interface.ipynb
    - notebooks/15_dichromatism_synthesis.ipynb

website:
  title: "Pigmentation gene network"
  description: "Grading genotype→phenotype links by making independent lines of evidence converge."
  site-url: https://tinalasisi.github.io/pigmentation-gene-network/
  favicon: assets/favicon.svg
  image: notebooks/figures/nb7_layer_stack.png
  open-graph: true
  twitter-card: true
  reader-mode: true
  page-navigation: true
  back-to-top-navigation: true
  page-footer:
    border: true
    left: "© 2026 Tina Lasisi · [MIT License](https://github.com/tinalasisi/pigmentation-gene-network/blob/main/LICENSE)"
    center: "Built with Claude · Life Sciences hackathon"
    right: "[GitHub](https://github.com/tinalasisi/pigmentation-gene-network)"
  navbar:
