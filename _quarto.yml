format:
  html:
    theme: [cosmo, theme.scss]
    toc: true
    toc-depth: 3
    toc-expand: 1
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    code-overflow: wrap
    fig-align: center
    df-print: paged
    grid:
      body-width: 860px
      sidebar-width: 300px

execute:
  enabled: false   # render stored notebook outputs only — no kernel, no network, no withheld data
